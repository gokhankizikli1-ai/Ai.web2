# Railway / Nixpacks build configuration.
#
# WHY THIS FILE EXISTS
# --------------------
# Railway migrated its default builder to Railpack, which uses
# `mise` internally for runtime detection. Every build failed
# with:
#
#   mise ERROR Failed to install core: python@3.11.9
#   verify GitHub artifact attestations
#   process "mise install" did not complete successfully
#
# `railway.toml` forces Nixpacks (back to the older, mise-free
# builder). This file then pins Python via Nix packages so the
# Nixpacks build cache resolves the interpreter directly — no
# mise involvement at any step.
#
# `runtime.txt` was deleted in the same commit. It was the legacy
# Heroku-style trigger that mise was reading. Without it, even if
# Railway flips builders again, mise has nothing to install.
#
# WHY WE DECLARE `providers` EXPLICITLY
# -------------------------------------
# Real failure (Production 2026-06-27): the Railway dashboard
# reported **"Providers: No providers"** for the web service.
# Nixpacks' auto-detection silently failed to identify Python /
# Node from requirements.txt + package.json. With no provider,
# Nixpacks ran the start command against a bare Python interpreter
# with NO pip installed:
#
#   RUN python -m pip install --upgrade pip
#   /root/.nix-profile/bin/python: No module named pip
#
# Two earlier attempts (PR #169 explicit [phases.install], PR #170
# pip-via-Nix) papered over this — but the actual fix is to tell
# Nixpacks "this IS a Python+Node project" up front. With
# `providers` declared, Nixpacks:
#   * Activates its Python provider → installs pip, creates a venv,
#     runs `pip install -r requirements.txt` correctly.
#   * Activates its Node provider → runs `npm ci` + `npm run build`.
#   * Shows the activated providers in the Railway dashboard
#     (instead of "No providers").
#
# Reverting PR #169/#170's workarounds in the same commit: the
# explicit [phases.install] and python311Packages.pip in nixPkgs
# are no longer needed (providers handle both) and would conflict
# with the provider-installed pip if left in. Net result: a
# SMALLER file, not a larger one.
#
# WHY `nodejs_20` IS NOT IN `nixPkgs`
# -----------------------------------
# PR #171 introduced `providers = ["python", "node"]` but kept
# `nodejs_20` in nixPkgs from the pre-providers era. With the Node
# provider active, that caused a Nix file conflict on shared
# Node header files (v8-microtask.h etc.) because two derivations
# tried to install the same files. The Node provider's own Node
# install is canonical — drop the manual nodejs_20 here and trust
# the provider for Node. Python is different: we still pin
# python311 in nixPkgs to keep the build off the mise path (see
# top of file).
#
# WHAT THIS FILE DOES NOT DO
# --------------------------
# * NO Dockerfile — still on Nixpacks, so the Procfile pattern
#   keeps each Railway service (web + worker) on the right
#   start command.
# * NO start command override — defer to Procfile (web) and
#   railway.worker.toml (worker).
#
# IF YOU NEED TO CHANGE THE PYTHON VERSION
# ----------------------------------------
# Edit nixPkgs below (e.g. `python312` for 3.12). `python311`
# resolves to the latest 3.11.x patch in nixpkgs. nixpkgs only
# ships the latest patch per minor; if a specific patch (e.g.
# 3.11.9 exactly) is needed, an overlay is required.

# Explicitly activate both providers — beats Nixpacks' fragile
# auto-detection. Shows up in the Railway dashboard's "Providers"
# field and triggers the canonical install behaviour for each
# language (pip + venv for Python, npm ci + npm run build for Node).
providers = ["python", "node"]

[phases.setup]
# python311  = Python 3.11.x (latest patch in current nixpkgs).
#              The Python provider installs pip + creates a venv
#              against whatever Python is in nixPkgs. We KEEP this
#              entry because removing it would let Nixpacks/Railpack
#              fall back to mise for Python resolution, which is the
#              exact failure mode railway.toml + this file were
#              created to escape (mise ERROR Failed to install core:
#              python@3.11.9 — see commits 9ceb694 + 7383beb).
#
# NOTE — no `nodejs_20` entry. The Node provider installs Node
# itself. Listing `nodejs_20` here too caused a Nix file conflict
# on shared header files (v8-microtask.h etc.) in 2026-06-27's
# build because the SAME files were installed by two derivations.
# The Node provider's own Node install is the canonical one.
#
# gcc        = build toolchain for any wheel-less Python dep
#              (asyncpg, psycopg, etc all ship binary wheels today
#              but gcc is a cheap defensive backstop).
nixPkgs = ["python311", "gcc"]

# ── Node install command override (2026-06-30 deploy fix) ──────────────
# WHY THIS EXISTS
# ----------------
# Railway production build failed with:
#   Unknown command: "ci"
#   "npm ci" did not complete successfully
#
# Root cause (verified locally with `npm ci --dry-run`): package.json and
# package-lock.json are out of sync — Sprint 1.8 added `vitest` as a
# devDependency but the lockfile was never regenerated (the dev sandbox's
# npm registry access was restricted, documented in
# SPRINT_1_8_LIVE_RUN_STREAMING.md). `npm ci` requires byte-for-byte sync
# between the two files and hard-fails otherwise:
#   npm error `npm ci` can only install packages when your package.json
#   and package-lock.json ... are in sync ... Missing: vitest@4.1.9 ...
# The Node provider (active via `providers = [..., "node"]` above) defaults
# to `npm ci` whenever a package-lock.json is present — that's what Railway
# was running.
#
# THE FIX
# -------
# Override ONLY the Node provider's install command to `npm install`, which
# reconciles the lockfile against package.json instead of requiring strict
# pre-existing sync — so a future dependency added without a lockfile
# regen no longer hard-fails the whole deploy.
#
# `providers = ["python", "node"]` makes "python" the FIRST provider and
# "node" the SECOND. Nixpacks exposes per-provider phase overrides via the
# `"<provider>:<phase>"` key syntax — `phases."node:install"` touches ONLY
# the Node provider's install phase. The Python provider's install phase
# (`phases.install`, the first/unprefixed name) is INTENTIONALLY left
# untouched here, so its pip/venv setup keeps using the provider default —
# exactly the behaviour `providers = [...]` was introduced to guarantee
# (see the long comment above). No other phase, no other provider, and no
# `nixPkgs` entry changes.
[phases."node:install"]
cmds = ["npm install"]
